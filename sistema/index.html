<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema · Registro Civil — Alcaldía de Cristóbal Rojas</title>
<style>
  :root{--navy:#0a2351;--navy2:#123571;--blue:#0a6cb0;--gold:#f4c20d;--red:#d21534;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#eef2f7;--surface:#fff;--ok:#16a34a;--r:12px;--sans:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  button{font:inherit;cursor:pointer;}
  input,select,textarea{font:inherit;width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc;color:var(--ink);outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);background:#fff;}
  textarea{min-height:64px;resize:vertical;}
  .hidden{display:none!important;}
  .tri{height:5px;display:flex}.tri i{flex:1}.tri i:nth-child(1){background:var(--gold)}.tri i:nth-child(2){background:var(--blue)}.tri i:nth-child(3){background:var(--red)}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:var(--navy2)}
  .btn.g{background:var(--ok)}.btn.g:hover{filter:brightness(1.06)}
  .btn.r{background:#fee2e2;color:#b91c1c}.btn.r:hover{background:#fecaca}
  .btn.o{background:#fff;color:var(--navy);border:1px solid #cbd5e1}.btn.o:hover{background:#f1f5f9}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#0a2351,#071a3d);}
  .card-login{background:#fff;border-radius:16px;box-shadow:0 30px 70px rgba(0,0,0,.4);width:100%;max-width:400px;overflow:hidden;}
  .card-login .hd{background:var(--navy);color:#fff;padding:26px 26px 22px;text-align:center;}
  .card-login .hd svg{margin:0 auto 8px}
  .card-login .hd b{display:block;font-size:16px;font-weight:850}
  .card-login .hd span{display:block;font-size:12px;color:#aebfdf;margin-top:2px}
  .card-login .bd{padding:24px}
  .card-login label{display:block;font-size:12.5px;font-weight:700;color:#334155;margin:12px 0 5px}
  .card-login .msg{font-size:13px;border-radius:8px;padding:9px 11px;margin-top:14px;display:none}
  .card-login .msg.err{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;display:block}
  .card-login .msg.ok{background:#f0fdf4;color:#15803d;border:1px solid #86efac;display:block}
  /* app shell */
  .top{background:var(--navy);color:#fff;display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;position:sticky;top:0;z-index:30}
  .top .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px}
  .top .brand span{font-size:11px;color:#aebfdf;font-weight:600}
  .top .sp{flex:1}
  .top .u{font-size:13px;color:#dbe4f5}.top .u b{color:#fff}
  .top .pill{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700}
  .menu-btn{display:none;background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;width:38px;height:38px;font-size:18px}
  .wrap{display:flex;min-height:calc(100vh - 61px)}
  .side{width:230px;background:#fff;border-right:1px solid var(--line);padding:14px 10px;flex:none}
  .side a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:650;color:#334155;margin-bottom:2px}
  .side a:hover{background:#f1f5f9}
  .side a.on{background:var(--navy);color:#fff}
  .side .grp{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;padding:12px 12px 5px}
  .main{flex:1;padding:22px;max-width:1100px;min-width:0}
  h1.t{font-size:22px;font-weight:850;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13.5px;margin-top:2px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 1px 2px rgba(11,23,48,.05),0 8px 24px rgba(11,23,48,.05);padding:18px;margin-top:16px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .stat{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:14px}
  .stat b{display:block;font-size:26px;font-weight:850;color:var(--navy)}
  .stat span{font-size:12.5px;color:var(--muted);font-weight:600}
  .grid-tram{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
  .tram-b{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;text-align:left;transition:.14s;display:flex;gap:11px;align-items:center}
  .tram-b:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 10px 24px rgba(10,35,81,.1)}
  .tram-b .ic{width:38px;height:38px;border-radius:9px;background:#e6f0fb;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
  .tram-b b{font-size:13.5px;font-weight:750;display:block}.tram-b small{color:var(--muted);font-size:11px}
  table{width:100%;border-collapse:collapse}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid #eef2f7;font-size:13px;vertical-align:top}
  th{background:var(--navy);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
  tbody tr:hover{background:#f8fafc}
  .badge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .badge.leg{background:#fef9c3;color:#854d0e}.badge.mine{background:#e6f0fb;color:#0a6cb0}.badge.a{background:#dcfce7;color:#15803d}
  .filtros{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .filtros input,.filtros select{width:auto;min-width:150px}
  .form-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
  .fld{display:flex;flex-direction:column;gap:4px}
  .fld label{font-size:12px;font-weight:700;color:#475569}
  .sec-t{grid-column:1/-1;font-size:13px;font-weight:800;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:5px;margin-top:8px;text-transform:uppercase;letter-spacing:.03em}
  .w2{grid-column:span 2}.w3{grid-column:span 3}.w4{grid-column:span 4}.w5{grid-column:span 5}.w6{grid-column:span 6}.w8{grid-column:span 8}.w12{grid-column:span 12}
  @media(max-width:760px){.w2,.w3,.w4,.w5,.w6,.w8{grid-column:span 6}.side{position:fixed;left:0;top:56px;bottom:0;z-index:25;transform:translateX(-100%);transition:.2s;box-shadow:0 10px 40px rgba(0,0,0,.2)}.side.open{transform:none}.menu-btn{display:block}.main{padding:16px}}
  .modal-bg{position:fixed;inset:0;background:rgba(8,15,30,.55);display:none;align-items:flex-start;justify-content:center;padding:24px;z-index:50;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:820px;width:100%;padding:22px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.3);display:none}
  .fila{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
  .fila .k{font-weight:700;color:#475569;min-width:190px}
  .empty{text-align:center;color:var(--muted);padding:34px}
  .spin{width:30px;height:30px;border:3px solid #dbe4f5;border-top-color:var(--navy);border-radius:50%;animation:sp 1s linear infinite;margin:30px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="card-login">
    <div class="tri"><i></i><i></i><i></i></div>
    <div class="hd">
      <svg viewBox="0 0 48 56" width="40" height="46"><path d="M24 2 44 9v20c0 13-9 21-20 25C13 50 4 42 4 29V9z" fill="#123571" stroke="#f4c20d" stroke-width="2"/><path d="M24 12l2.6 5.6 6 .8-4.4 4.3 1.1 6L24 31.9 18.7 34.7l1.1-6-4.4-4.3 6-.8z" fill="#f4c20d"/></svg>
      <b>Registro Civil</b><span>Alcaldía del Municipio Cristóbal Rojas</span>

        <input id="lgUser" autocomplete="username" placeholder="ej: carolina.garcia" />

        <label>Nueva contraseña</label>
        <input id="np1" type="password" placeholder="mínimo 6 caracteres" />

        <input id="np2" type="password" />
        <div class="msg" id="cpMsg"></div>
        <button class="btn g" id="cpBtn" style="width:100%;justify-content:center;margin-top:16px">Guardar y entrar</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <div class="tri"><i></i><i></i><i></i></div>
  <div class="top">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="brand"><svg viewBox="0 0 48 56" width="24" height="28"><path d="M24 2 44 9v20c0 13-9 21-20 25C13 50 4 42 4 29V9z" fill="#fff" stroke="#f4c20d" stroke-width="2"/><path d="M24 12l2.6 5.6 6 .8-4.4 4.3 1.1 6L24 31.9 18.7 34.7l1.1-6-4.4-4.3 6-.8z" fill="#f4c20d"/></svg><div>Registro Civil<span style="display:block">Cristóbal Rojas</span></div></div>
    <div class="sp"></div>
    <span class="u">Hola, <b id="uNom">—</b></span>
    <span class="pill" id="uRol">—</span>
    <button class="btn o sm" id="btnSalir">Salir</button>
  </div>
  <div class="wrap">
    <nav class="side" id="side"></nav>
    <main class="main" id="view"><div class="spin"></div></main>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

/* ============ AUTH ============ */
async function cargarPerfil() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return null;
  USER = user;
  const { data } = await sb.from("rc_perfiles").select("*").eq("id", user.id).single();
  PERFIL = data; return data;
}
async function registrar(accion, tipo, tramite_id, resumen, detalle) {
  try { await sb.from("rc_bitacora").insert({ actor: USER.id, actor_usuario: PERFIL.usuario, accion, tipo: tipo || null, tramite_id: tramite_id || null, resumen, detalle: detalle || null }); } catch (e) {}
}
$("lgBtn").onclick = async () => {
  const u = ($("lgUser").value || "").trim().toLowerCase().replace(/@.*$/, "");
  const p = $("lgPass").value;
  const msg = $("lgMsg"); msg.className = "msg";
  if (!u || !p) { msg.className = "msg err"; msg.textContent = "Ingresa usuario y contraseña."; return; }
  $("lgBtn").disabled = true; $("lgBtn").textContent = "Ingresando…";
  const { error } = await sb.auth.signInWithPassword({ email: u + DOM, password: p });
  $("lgBtn").disabled = false; $("lgBtn").textContent = "Ingresar";
  if (error) { msg.className = "msg err"; msg.textContent = "Usuario o contraseña incorrectos."; return; }
  await cargarPerfil();
  await registrar("login", null, null, "Inició sesión");
  if (PERFIL && PERFIL.must_change_password) { $("loginView").classList.add("hidden"); $("changeView").classList.remove("hidden"); }
  else iniciarApp();
};
$("lgPass").addEventListener("keydown", e => { if (e.key === "Enter") $("lgBtn").click(); });
$("cpBtn").onclick = async () => {
  const a = $("np1").value, b = $("np2").value, msg = $("cpMsg"); msg.className = "msg";
  if (a.length < 6) { msg.className = "msg err"; msg.textContent = "Mínimo 6 caracteres."; return; }
  if (a !== b) { msg.className = "msg err"; msg.textContent = "Las contraseñas no coinciden."; return; }
  if (a === "123456") { msg.className = "msg err"; msg.textContent = "No puede ser 123456; elige otra."; return; }
  $("cpBtn").disabled = true;
  const { error } = await sb.auth.updateUser({ password: a });
  if (error) { $("cpBtn").disabled = false; msg.className = "msg err"; msg.textContent = error.message; return; }
  await sb.from("rc_perfiles").update({ must_change_password: false }).eq("id", USER.id);
  PERFIL.must_change_password = false;
  await registrar("cambio_password", null, null, "Cambió su contraseña");
  iniciarApp();
};
$("btnSalir").onclick = async () => { await sb.auth.signOut(); location.reload(); };
$("menuBtn").onclick = () => $("side").classList.toggle("open");

/* ============ NAV ============ */
const esAdmin = () => PERFIL && PERFIL.rol === "admin";
function construirNav() {
  const items = [
    ["inicio", "🏠 Inicio", ""],
    ["form/nacimiento", "👶 Nacimiento", "Registro"],
    ["form/matrimonio", "💍 Matrimonio", "Registro"],
    ["form/defuncion", "🕊️ Defunción", "Registro"],
    ["documentos", "📄 Documentos", "Registro"],
    ["form/copia_acta", "🖨️ Entrega de Copias", "Registro"],
    ["form/permiso", "⚰️ Permisos", "Registro"],
    ["registros", "📋 Trámites y actas", "Consultas"],
    ["actividad", "🕒 Actividad", "Control"],
  ];
  if (esAdmin()) items.push(["usuarios", "👥 Usuarios", "Control"]);
  let html = "", grp = null;
  items.forEach(([id, lbl, g]) => { if (g !== grp) { if (g) html += `<div class="grp">${g}</div>`; grp = g; } html += `<a data-v="${id}" href="#${id}">${lbl}</a>`; });
  $("side").innerHTML = html;
  $("side").querySelectorAll("a").forEach(a => a.onclick = () => { $("side").classList.remove("open"); });
}
function iniciarApp() {
  $("login").classList.add("hidden"); $("app").classList.remove("hidden");
  $("uNom").textContent = PERFIL.nombre || PERFIL.usuario;
  $("uRol").textContent = esAdmin() ? "Administrador" : "Funcionario";
  construirNav();
  window.addEventListener("hashchange", router);
  router();
}
function setActive(hash) { $("side").querySelectorAll("a").forEach(a => a.classList.toggle("on", a.dataset.v === hash)); }
function router() {
  const h = (location.hash || "#inicio").slice(1);
  const [v, arg] = h.split("/");
  setActive(h);
  if (v === "inicio") vInicio();
  else if (v === "nuevo") vNuevo();
  else if (v === "documentos") vDocumentos();
  else if (v === "registros") vRegistros();
  else if (v === "legacy") vLegacy();

/* ---- Validación de cédula por CNE (autocompleta nombre/fecha; avisa si no está) ---- */
const CNE_ENDPOINT = "https://tfbzghjjfcaqmkzsxrrs.supabase.co/functions/v1/consultar-cedula";
function cneCampo(base, cn, words) {
  for (const w of words) for (const cand of [cn.replace("cedula", w), cn.replace("_cedula", "_" + w), cn.replace("cedula_", w + "_")]) {
    if (cand !== cn) { const el = base.querySelector('[data-n="' + cand + '"]'); if (el) return el; }
  }
  return null;
}
function engancharCNE(base) {
  base.querySelectorAll('[data-cednum]').forEach(ced => {
    if (ced.dataset.cne) return; ced.dataset.cne = "1";
    const cn = ced.dataset.cednum;
    const nomEl = cneCampo(base, cn, ["nombres", "nombre"]);
    const apeEl = cneCampo(base, cn, ["apellidos", "apellido"]);
    const fechaEl = cneCampo(base, cn, ["fecha_nac"]);
    const nota = document.createElement("div"); nota.style.cssText = "font-size:11px;margin-top:3px;min-height:12px;font-weight:600";
    (ced.closest(".fld") || ced.parentNode).appendChild(nota);
    ced.addEventListener("blur", async () => {
      const num = (ced.value || "").replace(/\D/g, ""); nota.textContent = ""; nota.style.color = "";
      if (num.length < 5 || num.length > 9) return;
      const pe = base.querySelector('[data-cedpfx="' + cn + '"]'); const nac = (pe && pe.value === "E") ? "E" : "V";
      const bg = ced.style.background; ced.style.background = "#fef9c3";
      try {
        const resp = await fetch(CNE_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ cedula: num, nacionalidad: nac }) });
        const j = await resp.json(); const d = j && j.data;
        if (resp.ok && d && j.error !== true && (d.primer_nombre || d.primer_apellido)) {
          if (nomEl && apeEl) {
            if (!nomEl.value.trim()) nomEl.value = [d.primer_nombre, d.segundo_nombre].filter(Boolean).join(" ");
            if (!apeEl.value.trim()) apeEl.value = [d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
          } else if (nomEl && !nomEl.value.trim()) {
            nomEl.value = [d.primer_nombre, d.segundo_nombre, d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
          }
          if (nomEl) nomEl.dispatchEvent(new Event("input", { bubbles: true }));
          if (fechaEl && !fechaEl.value && /^\d{4}-\d{2}-\d{2}$/.test(d.fecha_nac || "") && d.fecha_nac !== "0000-00-00") fechaEl.value = d.fecha_nac;
          ced.style.background = "#dcfce7"; setTimeout(() => { ced.style.background = bg; }, 1400);
          nota.style.color = "#15803d"; nota.textContent = "✓ CNE: " + [d.primer_nombre, d.segundo_nombre, d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
        } else {
          ced.style.background = bg; nota.style.color = "#b45309"; nota.textContent = "Cédula no registrada en CNE";
        }
      } catch (e) { ced.style.background = bg; }
    });
  });
}

function wireRepeaters(tipo, datos) {

    window.open(data.signedUrl, "_blank");
  };
}
async function eliminar(r) {
  if (!confirm(`¿Eliminar este trámite (${tipoLabel(r.tipo)} — ${r.titular})? No se puede deshacer.`)) return;

}

/* ---- Administración de usuarios ---- */
async function invocarAdmin(body) {
  const { data, error } = await sb.functions.invoke("admin-usuarios", { body });
  if (error) { let m = error.message; try { m = (await error.context.json()).error || m; } catch (e) {} throw new Error(m); }
  if (data && data.error) throw new Error(data.error);
  return data;
}
async function vUsuarios() {

/* ---- Impresión de constancia ---- */
// ===== Generación de PDF fiel al formato del PHP (FPDF/CNE) =====
const FIRMA = { nombre: "Emperatriz García Ponte", cedula: "V-6.216.949", resolucion: "HM-013-2019", gaceta: "N°24", fecha_res: "22/03/2019" };
const MESES = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
function fechaLarga(d) {
  if (!d) d = new Date();
  if (typeof d === "string") { const p = d.split("-"); if (p.length === 3) return `${+p[2]} de ${MESES[+p[1] - 1] || ""} de ${p[0]}`; return d; }
  return `${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
function nuevoDoc() { return new jsPDF({ unit: "mm", format: "legal", orientation: "portrait" }); }
function tricolor(doc) { const W = doc.internal.pageSize.getWidth(); doc.setFillColor(244, 194, 13); doc.rect(0, 0, W / 3, 3, "F"); doc.setFillColor(10, 108, 176); doc.rect(W / 3, 0, W / 3, 3, "F"); doc.setFillColor(210, 21, 52); doc.rect(2 * W / 3, 0, W / 3, 3, "F"); }
function firma(doc, y) {
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  if (y > H - 48) { doc.addPage(); y = 30; } else { y += 22; }
  doc.setDrawColor(0); doc.setLineWidth(0.3); doc.line(W / 2 - 38, y, W / 2 + 38, y);
  doc.setFont("times", "bold"); doc.setFontSize(10); doc.setTextColor(0, 0, 0);
  doc.text(FIRMA.nombre, W / 2, y + 5, { align: "center" });
  doc.setFont("times", "normal"); doc.setFontSize(8);
  doc.text("Registradora Civil del Municipio Cristóbal Rojas", W / 2, y + 9.5, { align: "center" });
  doc.text("C.I. " + FIRMA.cedula + " · Resolución N° " + FIRMA.resolucion + " · Gaceta " + FIRMA.gaceta, W / 2, y + 13.5, { align: "center" });
}
function generarActaPDF(r) {
  const cfg = TRAMITES[r.tipo], doc = nuevoDoc();
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight(), MX = 18, RX = W - 15;
  tricolor(doc);
  let y = 13;
  doc.setFont("helvetica", "bold"); doc.setFontSize(13); doc.setTextColor(0, 0, 0);
  doc.text(String(r.numero_acta || ""), RX, y, { align: "right" });
  doc.setFont("times", "normal"); doc.setFontSize(10.5);
  ["República Bolivariana de Venezuela", "Consejo Nacional Electoral", "Comisión de Registro Civil y Electoral", "Estado Bolivariano de Miranda", "Municipio Cristóbal Rojas", "Parroquia Charallave"].forEach((t, i) => doc.text(t, MX, y + i * 5));
  const fp = (r.fecha || "").split("-");
  doc.setFont("helvetica", "normal"); doc.setFontSize(9.5);
  const rl = RX - 42, ry = y + 15;
  doc.text("ACTA N°  " + (r.numero_acta || ""), rl, ry);
  doc.text("DÍA  " + (fp[2] || ""), rl, ry + 5); doc.text("MES  " + (fp[1] || ""), rl, ry + 10); doc.text("AÑO  " + (fp[0] || r.ano || ""), rl, ry + 15);
  y += 34;
  doc.setFont("helvetica", "bold"); doc.setFontSize(12);
  doc.text("REGISTRO — " + cfg.label.toUpperCase(), MX, y); y += 7;
  let letra = 65;
  const salto = (need) => { if (y + need > H - 16) { doc.addPage(); y = 18; } };
  cfg.secciones.forEach(sec => {
    const filas = sec.rep
      ? (Array.isArray((r.datos || {})[sec.rep.key]) ? (r.datos || {})[sec.rep.key] : []).flatMap((it, i) => sec.rep.campos.map(c => [sec.rep.singular + " " + (i + 1) + " · " + c.l, it[c.n]])).filter(x => x[1] != null && String(x[1]).trim() !== "")
      : sec.campos.map(c => [c.l, (r.datos || {})[c.n]]).filter(x => x[1] != null && String(x[1]).trim() !== "");
    const L = String.fromCharCode(letra); letra++;
    if (!filas.length) return;
    salto(12);
    doc.setFillColor(222, 222, 222); doc.setDrawColor(120); doc.setLineWidth(0.2);
    doc.rect(MX, y, RX - MX, 6, "FD");
    doc.setFont("times", "bold"); doc.setFontSize(10); doc.setTextColor(0, 0, 0);
    doc.text(L + ".  " + sec.t, MX + 2, y + 4.2);
    y += 7.5;
    doc.setFontSize(9.5);
    filas.forEach(([k, v]) => {
      doc.setFont("times", "bold"); const lbl = k + ": ";
      const lw = doc.getTextWidth(lbl);
      const vl = doc.splitTextToSize(String(v), RX - MX - 3 - lw);
      salto(vl.length * 4.4 + 3);
      doc.setFont("times", "bold"); doc.text(lbl, MX + 2, y);
      doc.setFont("times", "normal"); doc.text(vl, MX + 2 + lw, y);
      y += vl.length * 4.4 + 2.2;
    });
    y += 3;
  });
  firma(doc, y);
  return doc;
}
function narrativa(r) {
  const d = r.datos || {};
  const nom = (r.titular || d.nombres || "").trim();
  const ced = d.cedula || r.cedula_titular || "";
  let b = `Quien suscribe, ${FIRMA.nombre}, Registradora Civil del Municipio Cristóbal Rojas del Estado Bolivariano de Miranda, según Resolución N° ${FIRMA.resolucion}, por medio de la presente hace constar que el(la) ciudadano(a) ${nom}, titular de la cédula de identidad N° ${ced}`;
  if (d.fecha_nac) b += `, nacido(a) el ${fechaLarga(d.fecha_nac)}`;
  if (d.nacionalidad) b += `, de nacionalidad ${d.nacionalidad}`;
  if (d.estado_civil) b += `, de estado civil ${d.estado_civil}`;
  if (d.profesion) b += `, de profesión ${d.profesion}`;
  const c = {
    fe_vida: `, se encuentra VIVO(A) y domiciliado(a) en ${d.direccion || "esta jurisdicción"}. La presente Fe de Vida tiene validez por un (1) año.`,
    residencia: `, reside de forma permanente en ${d.direccion || "—"}, con un tiempo de ${d.tiempo || ""} ${d.indicador || ""}, según aval de ${d.organo || "la comunidad organizada"}.`,
    solteria: `, es de estado civil SOLTERO(A) y domiciliado(a) en ${d.direccion || "—"}.`,
    buena_conducta: `, observa BUENA CONDUCTA, según aval de ${d.organo || "la comunidad organizada"}, y está domiciliado(a) en ${d.direccion || "—"}.`,
    perdida: `, declara BAJO FE DE JURAMENTO haber extraviado el (los) siguiente(s) documento(s): ${d.documentos || "—"}.`,
    manutencion: `, a los fines de la presente Constancia de Manutención${d.nombres_t ? ", siendo su representante/tutor(a) " + d.nombres_t : ""}.`,
    expensa: `, a los fines de la presente Constancia de Expensa${d.nombres_t ? ", ante " + d.nombres_t : ""}.`,
    viudez: `, es de estado civil VIUDO(A)${d.viudo_desde ? " desde " + d.viudo_desde : ""}${d.nombres2 ? " del (la) ciudadano(a) " + d.nombres2 : ""}${d.direccion ? ", domiciliado(a) en " + d.direccion : ""}.`,
  }[r.tipo] || `, a los fines legales consiguientes.`;
  return b + c;
}
function generarConstanciaPDF(r) {
  const cfg = TRAMITES[r.tipo], doc = nuevoDoc();
  const W = doc.internal.pageSize.getWidth(), MX = 24, RX = W - 24;
  tricolor(doc);
  let y = 22;
  doc.setFont("times", "bold"); doc.setFontSize(11); doc.setTextColor(0, 0, 0);
  ["REPÚBLICA BOLIVARIANA DE VENEZUELA", "ESTADO BOLIVARIANO DE MIRANDA", "MUNICIPIO CRISTÓBAL ROJAS", "OFICINA DE REGISTRO CIVIL"].forEach((t, i) => doc.text(t, W / 2, y + i * 5, { align: "center" }));
  y += 28;
  doc.setFontSize(16); doc.setTextColor(10, 35, 81); doc.text(cfg.label.toUpperCase(), W / 2, y, { align: "center" });
  y += 14; doc.setTextColor(0, 0, 0); doc.setFont("times", "normal"); doc.setFontSize(11.5);
  const lines = doc.splitTextToSize(narrativa(r), RX - MX);
  doc.text(lines, MX, y); y += lines.length * 6.4 + 12;
  doc.text(doc.splitTextToSize("Se expide la presente constancia a petición de la parte interesada, en Charallave, a los " + fechaLarga(new Date()) + ".", RX - MX), MX, y);
  y += 16;
  firma(doc, y);
  return doc;
}
function imprimir(r) {
  const cfg = TRAMITES[r.tipo]; if (!cfg) { toast("Este documento no tiene formato de acta."); return; }
  let doc;
  try { doc = cfg.num ? generarActaPDF(r) : generarConstanciaPDF(r); }
  catch (e) { toast("No se pudo generar el PDF: " + (e.message || e)); return; }
  const base = (cfg.label + " " + (r.numero_acta ? "N " + r.numero_acta : (r.titular || ""))).normalize("NFD").replace(/[^\w\- ]/g, "").trim().replace(/\s+/g, "_");
  doc.save((base || "acta") + ".pdf");
  registrar("imprimir", r.tipo, r.id, `Generó el PDF de ${cfg.label}: ${r.titular}`);
}
function imprimirPDF(r) {
  const cfg = TRAMITES[r.tipo]; if (!cfg) { toast("Este documento no tiene formato de acta."); return; }
  let doc;
  try { doc = cfg.num ? generarActaPDF(r) : generarConstanciaPDF(r); }
  catch (e) { toast("No se pudo generar el PDF: " + (e.message || e)); return; }
  try { if (doc.autoPrint) doc.autoPrint(); const w = window.open(doc.output("bloburl"), "_blank"); if (!w) { toast("Permite ventanas emergentes para imprimir"); return; } }
  catch (e) { toast("No se pudo abrir para imprimir"); return; }
  registrar("imprimir", r.tipo, r.id, `Imprimió ${cfg.label}: ${r.titular}`);
}
