ursos de cada uno, al cuidado y mantenimiento del hogar común, y a las cargas y demás gastos matrimoniales. En esta misma forma ambos cónyuges debe asistirse recíprocamente en la satisfacción de sus necesidades. Esta obligación cesa para el conyugue que se separe del hogar con justa causa. El cónyuge que dejare de cumplir, sin causa justificada, con estas obligaciones, podrá ser obligado judicialmente a ello, a solicitud de otro.\nArt. 140. Los cónyuges, de mútuo acuerdo, tomarán las decisiones relativas a la vida familiar, y fijarán el domicilio conyugal.\nArt. 140A. El domicilio conyugal será el lugar donde el marido y la mujer tengan establecida de mútuo acuerdo, su residencia. En caso de que los cónyuges tuvieren residencias separadas, de hecho o en virtud de la autorización judicial prevista en el artículo 138, el domicilio conyugal será el lugar de la última residencia común. El Cambio de residencia sólo podrá hacerse si ambos cónyuges estan de acuerdo en ello."},{"t":"Capitulaciones","campos":[{"n":"capi_tiene","l":"¿Existen capitulaciones matrimoniales?","t":"sel","w":4,"o":["Sí","No"]},{"n":"capi_datos","l":"Datos del registro","t":"ta","w":8},{"n":"capi_numero","l":"N°","t":"t","w":3},{"n":"capi_fecha","l":"Fecha","t":"date","w":3}]},{"t":"Apoderado(a)","campos":[{"n":"apo_nombres","l":"Nombres","t":"t","w":6},{"n":"apo_cedula","l":"Documento de identidad","t":"ced","w":6},{"n":"apo_poder","l":"Datos del poder / notaría","t":"ta","w":6},{"n":"apo_numero","l":"N°","t":"t","w":3},{"n":"apo_fecha","l":"Fecha","t":"date","w":3}]},{"t":"Aceptación expresa de los contrayentes","aceptacion":true,"campos":[{"n":"acepta_a","l":"Él","t":"t","w":6},{"n":"acepta_b","l":"Ella","t":"t","w":6}]},{"t":"Hijos a legitimar","rep":{"key":"hijos","singular":"hijo","plural":"hijos","campos":[{"n":"nombres","l":"Nombres y apellidos","t":"t","w":5},{"n":"documento","l":"Documento (cédula)","t":"ced","w":3},{"n":"edad","l":"Edad","t":"t","w":2},{"n":"acta","l":"Datos de acta","t": // Ticker BCV (dolar/euro oficial) — mismo formato que la landing, cache 3 h.
async function cargarBCV() {
  const U = document.getElementById("bcvUsd"), E = document.getElementById("bcvEur"); if (!U || !E) return;
  const fmt = (n) => "Bs " + Number(n).toLocaleString("es-VE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  try {
    const c = JSON.parse(localStorage.getItem("bcv_rc") || "null");
    if (c && Date.now() - c.t < 108e5) { U.textContent = fmt(c.usd); E.textContent = fmt(c.eur); return; }
    const [ru, re] = await Promise.all([
      fetch("https://ve.dolarapi.com/v1/dolares/oficial").then(r => r.json()),
      fetch("https://ve.dolarapi.com/v1/euros/oficial").then(r => r.json()),
    ]);
    const usd = ru.promedio || ru.venta, eur = re.promedio || re.venta;
    if (usd) U.textContent = fmt(usd); if (eur) E.textContent = fmt(eur);
    if (usd && eur) localStorage.setItem("bcv_rc", JSON.stringify({ usd, eur, t: Date.now() }));
  } catch (e) {}
}

function reportePDF(porTipo, porAno, tot) {
  const doc = new jsPDF({ unit: "mm", format: "letter", orientation: "portrait" });
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  tricolor(doc);
  doc.setFont("times", "bold"); doc.setFontSize(12); doc.setTextColor(0, 0, 0);
  ["REPÚBLICA BOLIVARIANA DE VENEZUELA", "Oficina de Registro Civil — Municipio Cristóbal Rojas · Charallave"].forEach((t, i) => doc.text(t, W / 2, 16 + i * 6, { align: "center" }));
  doc.setFontSize(15); doc.setTextColor(10, 35, 81); doc.text("REPORTE ESTADÍSTICO", W / 2, 34, { align: "center" });
  doc.setTextColor(0, 0, 0); doc.setFontSize(11);
  let y = 46;
  doc.text(`Total: ${tot.total}   ·   Registrados en el sistema: ${tot.nuevos}   ·   Actas del archivo: ${tot.archivo}`, 18, y); y += 11;
  const bloque = (titulo, entradas) => {
    if (y > H - 24) { doc.addPage(); y = 20; }
    doc.setFont("times", "bold"); doc.setFontSize(12); doc.text(titulo, 18, y); y += 7; doc.setFont("times", "normal"); doc.setFontSize(11);
    entradas.forEach(([k, v]) => { if (y > H - 16) { doc.addPage(); y = 20; } doc.text(String(k), 22, y); doc.text(String(v), W - 20, y, { align: "right" }); doc.setDrawColor(230); doc.line(18, y + 1.5, W - 18, y + 1.5); y += 6.5; }); y += 5;
  };
  bloque("Por tipo de trámite", Object.entries(porTipo).sort((a, b) => b[1] - a[1]).map(([k, v]) => [tipoLabel(k), v]));
  bloque("Por año", Object.entries(porAno).sort((a, b) => String(b[0]).localeCompare(String(a[0]))));
  doc.setFontSize(8); doc.setTextColor(120); doc.text("Generado por el Sistema de Registro Civil de la Alcaldía del Municipio Cristóbal Rojas.", W / 2, H - 12, { align: "center" });
  doc.save("reporte_registro_civil.pdf");
  registrar("reporte", null, null, "Generó un reporte estadístico");
}

    origen: $("crOrigen").value || null,

async function cargarCentroReportes(modelo) {
  const f = filtrosCentro(modelo);
  if (f.desde && f.hasta && f.desde > f.hasta) { toast("La fecha inicial no puede ser posterior a la fecha final."); return; }
  if (modelo === "especifico" && !f.tipo) { toast("Selecciona el tipo de trámite."); return; }

  const { data, error } = await sb.rpc("rc_centro_reportes", {
    p_desde: f.desde, p_hasta: f.hasta, p_tipo: f.tipo, p_funcionario: f.funcionario, p_origen: f.origen,
  });
  if (error || !data) { $("crResultado").innerHTML = `<div class="card"><div class="empty">No se pudo generar el reporte. ${esc(error && error.message || "")}</div></div>`; return; }
  CENTRO_ESTADO = { filtros: f, data, pagina: 1 };
  if (!CENTRO_FUNCIONARIOS.length) CENTRO_FUNCIONARIOS = Object.keys(data.por_funcionario || {}).filter(x => x && x !== "Sin funcionario").sort();
  const sel = $("crFunc");
  if (sel && sel.options.length <= 1 && CENTRO_FUNCIONARIOS.length) sel.innerHTML = `<option value="">Todos los funcionarios</option>` + CENTRO_FUNCIONARIOS.map(x => `<option value="${esc(x)}">${esc(x)}</option>`).join("");
  pintarCentroReportes(f, data);
  await registrar("reporte", f.tipo, null, `Consultó ${f.titulo} del ${f.desde || "inicio"} al ${f.hasta || "hoy"}`);
}

function pintarCentroReportes(f, data) {

async function cargarPaginaCentro(pagina) {
  if (!CENTRO_ESTADO) return;
  const total = Number(CENTRO_ESTADO.data.total || 0);
  const paginas = Math.max(1, Math.ceil(total / CENTRO_POR_PAGINA));
  pagina = Math.max(1, Math.min(pagina, paginas));
  const cont = $("crVista"); if (cont) cont.style.opacity = ".55";
  let q = sb.from("rc_tramites").select("id,fecha,tipo,titular,cedula_titular,numero_acta,ano,owner_usuario,created_at")
    .order("fecha", { ascending: false, nullsFirst: false }).order("created_at", { ascending: false });
  const f = CENTRO_ESTADO.filtros;
  if (f.desde) q = q.gte("fecha", f.desde); if (f.hasta) q = q.lte("fecha", f.hasta);
  if (f.tipo) q = q.eq("tipo", f.tipo); if (f.funcionario) q = q.eq("owner_usuario", f.funcionario);
  if (f.origen) q = q.eq("legacy", f.origen === "archivo");
  const desde = (pagina - 1) * CENTRO_POR_PAGINA;
  const { data, error } = await q.range(desde, desde + CENTRO_POR_PAGINA - 1);
  if (cont) cont.style.opacity = "1";
  if (error) { toast("No se pudo cargar la página: " + error.message); return; }
  CENTRO_ESTADO.pagina = pagina;
  pintarPaginaCentro(data || [], pagina);
  $("crVista")?.scrollIntoView({ behavior: "smooth", block: "center" });
}

function consultaDetalleCentro(f) {
  let q = sb.from("rc_tramites").select("fecha,tipo,titular,cedula_titular,numero_acta,ano,legacy,owner_usuario").order("fecha", { ascending: true });
  if (f.desde) q = q.gte("fecha", f.desde); if (f.hasta) q = q.lte("fecha", f.hasta);
  if (f.tipo) q = q.eq("tipo", f.tipo); if (f.funcionario) q = q.eq("owner_usuario", f.funcionario);
  if (f.origen) q = q.eq("legacy", f.origen === "archivo");
  return q;
}

async function obtenerDetalleCentro(f, limite) {
  const filas = [], bloque = 1000, maximo = limite || 200000;
  for (let desde = 0; desde < maximo; desde += bloque) {
    const { data, error } = await consultaDetalleCentro(f).range(desde, Math.min(desde + bloque - 1, maximo - 1));
    if (error) {
      let detalle = null;
      try { detalle = await error.context?.clone?.().json(); } catch (_) {}
      const fallo = new Error(detalle?.error || error.message || "La función de IA no respondió correctamente.");
      fallo.status = error.context?.status;
      throw fallo;
    }
    filas.push(...(data || []));
    if (!data || data.length < bloque) break;
  }
  return filas;
}

}

const CNE_ENDPOINT = "https://tfbzghjjfcaqmkzsxrrs.supabase.co/functions/v1/consultar-cedula";
function cneCampo(base, cn, words) {
  for (const w of words) for (const cand of [cn.replace("cedula", w), cn.replace("_cedula", "_" + w), cn.replace("cedula_", w + "_")]) {

// Nucleo CNE reutilizable: valida una cedula y autocompleta nombre/apellido/fecha del elemento dado (sirve para campos normales y para los de repetidores).
function cneAttach(cedNumEl, pfxEl, nomEl, apeEl, fechaEl) {
  const nota = document.createElement("div"); nota.style.cssText = "font-size:11px;margin-top:3px;min-height:12px;font-weight:600";
  (cedNumEl.closest(".fld") || cedNumEl.parentNode).appendChild(nota);
  cedNumEl.addEventListener("blur", async () => {
    const num = (cedNumEl.value || "").replace(/\D/g, ""); nota.textContent = ""; nota.style.color = "";
    if (num.length < 5 || num.length > 9) return;
    const nac = (pfxEl && pfxEl.value === "E") ? "E" : "V";
    const bg = cedNumEl.style.background; cedNumEl.style.background = "#fef9c3";
    try {
      const resp = await fetch(CNE_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ cedula: num, nacionalidad: nac }) });
      const j = await resp.json(); const d = j && j.data;
      if (resp.ok && d && j.error !== true && (d.primer_nombre || d.primer_apellido)) {
        if (nomEl && apeEl) {
          if (!nomEl.value.trim()) nomEl.value = [d.primer_nombre, d.segundo_nombre].filter(Boolean).join(" ");
          if (!apeEl.value.trim()) apeEl.value = [d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
        } else if (nomEl && !nomEl.value.trim()) {
          nomEl.value = [d.primer_nombre, d.segundo_nombre, d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
        }
        if (nomEl) nomEl.dispatchEvent(new Event("input", { bubbles: true }));
        if (fechaEl && !fechaEl.value && /^\d{4}-\d{2}-\d{2}$/.test(d.fecha_nac || "") && d.fecha_nac !== "0000-00-00") fechaEl.value = d.fecha_nac;
        cedNumEl.style.background = "#dcfce7"; setTimeout(() => { cedNumEl.style.background = bg; }, 1400);
        nota.style.color = "#15803d"; nota.textContent = "✓ CNE: " + [d.primer_nombre, d.segundo_nombre, d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
      } else {
        cedNumEl.style.background = bg; nota.style.color = "#b45309"; nota.textContent = "Cédula no registrada en CNE";
      }
    } catch (e) { cedNumEl.style.background = bg; }
  });
}

const TAMANO_PAGINA = 100;
const limpiarBusqueda = (valor) => String(valor || "").replace(/[(),\\"']/g, " ").trim();
async function vRegistros() {
  const view = $("view");
  view.innerHTML = `<h1 class="t">Trámites y actas</h1><div class="sub">Todos los usuarios pueden consultar los registros del sistema y las actas del archivo.</div>
    <div class="card"><div class="filtros">

      <select id="rOrigen"><option value="">Todo el origen</option><option value="nuevo">Registrados en el sistema</option><option value="archivo">Actas del archivo (importadas)</option></select>
    </div><div id="rTabla"><div class="spin"></div></div></div>`;
  let pagina = 1, espera = null, solicitud = 0;
  const cargar = async () => {
    const actual = ++solicitud;

    const q = limpiarBusqueda($("rBuscar").value), ft = $("rTipo").value, fo = $("rOrigen").value;
    let consulta = sb.from("rc_tramites")

    if (ft) consulta = consulta.eq("tipo", ft);
    if (fo) consulta = consulta.eq("legacy", fo === "archivo");
    if (q) {

      if (/^\d+$/.test(q)) filtros.push(`numero_acta.eq.${q}`);
      consulta = consulta.or(filtros.join(","));
    }
    const desde = (pagina - 1) * TAMANO_PAGINA;
    const { data, count, error } = await consulta.range(desde, desde + TAMANO_PAGINA - 1);
    if (actual !== solicitud) return;
    if (error) { $("rTabla").innerHTML = `<div class="empty">No se pudieron cargar los registros. ${esc(error.message)}</div>`; return; }
    const lista = data || [], total = count || 0, paginas = Math.max(1, Math.ceil(total / TAMANO_PAGINA));

    $("rTabla").innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;color:#64748b;font-size:12.5px;margin-bottom:8px"><span>${total.toLocaleString("es-VE")} registro(s)</span><span>Página ${pagina.toLocaleString("es-VE")} de ${paginas.toLocaleString("es-VE")}</span></div><div style="overflow:auto"><table><thead><tr><th>Trámite</th><th>Titular</th><th>Cédula</th><th>N° / Año</th><th>Origen</th><th></th></tr></thead><tbody>${lista.map(r => `<tr>
      <td><b>${esc(tipoLabel(r.tipo))}</b></td><td>${esc(r.titular || "—")}</td><td>${esc(r.cedula_titular || "—")}</td>
      <td>${r.numero_acta ? esc(r.numero_acta) + (r.ano ? " / " + r.ano : "") : "—"}</td>
      <td>${r.legacy ? '<span class="badge leg">Archivo</span>' : `<span class="badge ${r.owner === USER.id ? "mine" : "a"}">${esc(r.owner_usuario || "—")}</span>`}</td>
      <td><button class="btn o sm" data-ver="${r.id}">Ver</button></td></tr>`).join("")}</tbody></table></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn o sm" id="rPrev" ${pagina <= 1 ? "disabled" : ""}>← Anterior</button><button class="btn o sm" id="rNext" ${pagina >= paginas ? "disabled" : ""}>Siguiente →</button></div>`;
    $("rTabla").querySelectorAll("[data-ver]").forEach(b => b.onclick = () => go("ver/" + b.dataset.ver));
    $("rPrev").onclick = () => { if (pagina > 1) { pagina--; cargar(); } };
    $("rNext").onclick = () => { if (pagina < paginas) { pagina++; cargar(); } };
  };

  cargar();
}

function etiquetaDatoOriginal(ruta) {
  const especiales = { source: "Tabla de origen", source_id: "Identificador original", tipo_original: "Trámite original", acta_original: "Número de acta original", constancia_original: "Número de constancia original", fecha_original: "Fecha original", hora_original: "Hora original", funcionario: "Funcionario original", autoridad: "Autoridad original", nombre_enriquecido: "Nombre recuperado", libro: "Datos del libro", detalle_tabla: "Datos detallados recuperados" };

function aplanarDatosOriginales(valor, ruta = "", salida = []) {
  if (valor == null || valor === "") return salida;
  if (Array.isArray(valor)) {
    valor.forEach((v, i) => aplanarDatosOriginales(v, `${ruta}.${i + 1}`, salida));
  } else if (typeof valor === "object") {
    Object.entries(valor).forEach(([k, v]) => {
      if (/password|contrase|token|secret/i.test(k)) return;
      aplanarDatosOriginales(v, ruta ? `${ruta}.${k}` : k, salida);
    });
  } else {
    salida.push({ ruta, etiqueta: etiquetaDatoOriginal(ruta), valor: String(valor) });
  }
  return salida;
}
function bloqueDatosOriginales(r) {

}

  if ($("descargarOrig")) $("descargarOrig").onclick = () => abrirPdfOriginal(r.pdf_path, r.titular || "acta");
}
// Actas del archivo: entregar el PDF ORIGINAL tal cual (sin regenerar). descargarComo=false -> ver en el navegador.
async function abrirPdfOriginal(pdfPath, descargarComo) {
  const opts = descargarComo ? { download: (String(descargarComo).replace(/[^\w .-]/g, "_").slice(0, 60) || "acta") + ".pdf" } : {};
  const { data, error } = await sb.storage.from("actas").createSignedUrl(pdfPath, 3600, opts);
  if (error || !data) { toast("No se pudo abrir el PDF"); return; }
  if (descargarComo) { const a = document.createElement("a"); a.href = data.signedUrl; a.download = ""; document.body.appendChild(a); a.click(); a.remove(); }
  else window.open(data.signedUrl, "_blank");
}
async function eliminar(r) {
  if (!confirm(`¿Eliminar este trámite (${tipoLabel(r.tipo)} — ${r.titular})? No se puede deshacer.`)) return;
  const { error } = await sb.from("rc_tramites").delete().eq("id", r.id);
  if (error) { toast("Error: " + error.message); return; }
  await registrar("eliminar", r.tipo, null, `Eliminó ${tipoLabel(r.tipo)}: ${r.titular}`);
  toast("Trámite eliminado"); go("registros");
}

/* ---- Actas pre-cargadas ---- */
async function vLegacy() {
  $("view").innerHTML = `<h1 class="t">Actas pre-cargadas</h1><div class="sub">Actas y documentos importados del sistema anterior, ya clasificados por tipo. Visibles para todos; el administrador puede editarlos y descargar el PDF original.</div>
    <div class="card"><div class="filtros">
      <input id="lBuscar" placeholder="Buscar por nombre, cédula, N°…" style="min-width:240px">
      <select id="lTipo"><option value="">Todos los tipos</option>${opcionesTipos()}<option value="reporte">Reportes de oficina</option></select>
    </div><div id="lTabla"><div class="spin"></div></div></div>`;
  let pagina = 1, espera = null, solicitud = 0;
  const cargar = async () => {
    const actual = ++solicitud;
    $("lTabla").innerHTML = `<div class="spin"></div>`;
    const q = limpiarBusqueda($("lBuscar").value), ft = $("lTipo").value;
    let consulta = sb.from("rc_tramites")
      .select("id,tipo,titular,cedula_titular,numero_acta,ano,pdf_path", { count: "exact" })
      .eq("legacy", true)
      .order("created_at", { ascending: false });
    if (ft) consulta = consulta.eq("tipo", ft);
    if (q) {
      const filtros = [`titular.ilike.%${q}%`, `cedula_titular.ilike.%${q}%`];
      if (/^\d+$/.test(q)) filtros.push(`numero_acta.eq.${q}`);
      consulta = consulta.or(filtros.join(","));
    }
    const desde = (pagina - 1) * TAMANO_PAGINA;
    const { data, count, error } = await consulta.range(desde, desde + TAMANO_PAGINA - 1);
    if (actual !== solicitud) return;
    if (error) { $("lTabla").innerHTML = `<div class="empty">No se pudieron cargar las actas. ${esc(error.message)}</div>`; return; }
    const lista = data || [], total = count || 0, paginas = Math.max(1, Math.ceil(total / TAMANO_PAGINA));
    if (!lista.length) { $("lTabla").innerHTML = `<div class="empty">Sin documentos con ese filtro.</div>`; return; }
    $("lTabla").innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;color:#64748b;font-size:12.5px;margin-bottom:8px"><span>${total.toLocaleString("es-VE")} documento(s)</span><span>Página ${pagina.toLocaleString("es-VE")} de ${paginas.toLocaleString("es-VE")}</span></div><div style="overflow:auto"><table><thead><tr><th>Tipo</th><th>Titular</th><th>Cédula</th><th>N°/Año</th><th></th></tr></thead><tbody>${lista.map(r => `<tr>
      <td><b>${esc(tipoLabel(r.tipo))}</b></td><td>${esc(r.titular || "—")}</td><td>${esc(r.cedula_titular || "—")}</td>
      <td>${r.numero_acta ? esc(r.numero_acta) + (r.ano ? "/" + r.ano : "") : "—"}</td>
      <td style="white-space:nowrap"><button class="btn o sm" data-ver="${r.id}">Ver</button>${r.pdf_path ? ` <button class="btn o sm" data-pdf="${esc(r.pdf_path)}">📄 PDF</button>` : ""}</td></tr>`).join("")}</tbody></table></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn o sm" id="lPrev" ${pagina <= 1 ? "disabled" : ""}>← Anterior</button><button class="btn o sm" id="lNext" ${pagina >= paginas ? "disabled" : ""}>Siguiente →</button></div>`;
    $("lTabla").querySelectorAll("[data-ver]").forEach(b => b.onclick = () => go("ver/" + b.dataset.ver));
    $("lTabla").querySelectorAll("[data-pdf]").forEach(b => b.onclick = async () => {
      const { data: d, error } = await sb.storage.from("actas").createSignedUrl(b.dataset.pdf, 3600);
      if (error) { toast("No se pudo abrir el PDF"); return; } window.open(d.signedUrl, "_blank");
    });
    $("lPrev").onclick = () => { if (pagina > 1) { pagina--; cargar(); } };
    $("lNext").onclick = () => { if (pagina < paginas) { pagina++; cargar(); } };
  };
  $("lBuscar").oninput = () => { clearTimeout(espera); espera = setTimeout(() => { pagina = 1; cargar(); }, 300); };
  $("lTipo").onchange = () => { pagina = 1; cargar(); };
  cargar();
}

let canalBitacora = null;
async function vActividad() {
  $("view").innerHTML = `<h1 class="t">Actividad ${esAdmin() ? '<span class="badge a" style="vertical-align:middle">en vivo</span>' : ""}</h1>
    <div class="sub">${esAdmin() ? "Registro en tiempo real de lo que hace cada usuario." : "Tu historial de acciones."}</div>
    <div class="card"><div class="filtros">
      <input id="aBuscar" placeholder="Buscar en la actividad…" style="min-width:220px">
      ${esAdmin() ? `<select id="aUsuario"><option value="">Todos los usuarios</option></select>` : ""}
      <select id="aAccion"><option value="">Todas las acciones</option><option value="crear">Crear</option><option value="editar">Editar</option><option value="eliminar">Eliminar</option><option value="login">Inicio de sesión</option><option value="crear_usuario">Crear usuario</option><option value="reset_password">Reset contraseña</option></select>
    </div><div id="aTabla"><div class="spin"></div></div></div>`;
  let ROWS = [];
  const cargar = async () => {
    const { data } = await sb.from("rc_bitacora").select("*").order("created_at", { ascending: false }).limit(1000);
    ROWS = data || [];
    if (esAdmin() && $("aUsuario")) {
      const us = [...new Set(ROWS.map(r => r.actor_usuario).filter(Boolean))].sort();
      const cur = $("aUsuario").value;
      $("aUsuario").innerHTML = `<option value="">Todos los usuarios</option>` + us.map(u => `<option ${u === cur ? "selected" : ""}>${esc(u)}</option>`).join("");
    }
    pintar();
  };
  const accLbl = { crear: "Creó", editar: "Editó", eliminar: "Eliminó", login: "Ingresó", cambio_password: "Cambió clave", crear_usuario: "Creó usuario", reset_password: "Reseteó clave", eliminar_usuario: "Eliminó usuario", editar_usuario: "Editó usuario" };
  const pintar = () => {
    const q = ($("aBuscar").value || "").toLowerCase(), fu = $("aUsuario") ? $("aUsuario").value : "", fa = $("aAccion").value;
    const lista = ROWS.filter(r => (!fu || r.actor_usuario === fu) && (!fa || r.accion === fa) && (!q || (`${r.actor_usuario} ${r.resumen} ${r.accion}`.toLowerCase().includes(q))));
    if (!lista.length) { $("aTabla").innerHTML = `<div class="empty">Sin actividad con ese filtro.</div>`; return; }
    $("aTabla").innerHTML = `<div style="overflow:auto"><table><thead><tr><th>Fecha y hora</th><th>Usuario</th><th>Acción</th><th>Detalle</th></tr></thead><tbody>${lista.map(r => `<tr>
      <td style="white-space:nowrap">${new Date(r.created_at).toLocaleString("es-VE", { day: "2-digit", month: "2-digit", year: "2-digit", hour: "2-digit", minute: "2-digit" })}</td>
      <td><span class="badge mine">${esc(r.actor_usuario || "—")}</span></td>
      <td><b>${esc(accLbl[r.accion] || r.accion)}</b></td>
      <td>${esc(r.resumen || "")}</td></tr>`).join("")}</tbody></table></div>`;
  };
  $("aBuscar").oninput = pintar; $("aAccion").onchange = pintar; if ($("aUsuario")) $("aUsuario").onchange = pintar;
  await cargar();
  if (canalBitacora) { sb.removeChannel(canalBitacora); canalBitacora = null; }
  if (esAdmin()) {
    canalBitacora = sb.channel("bitacora-live").on("postgres_changes", { event: "INSERT", schema: "public", table: "rc_bitacora" }, () => cargar()).subscribe();
  }
}

/* ---- Administración de usuarios ---- */
async function invocarAdmin(body) {
  const { data, error } = await sb.functions.invoke("admin-usuarios", { body });
  if (error) { let m = error.message; try { m = (await error.context.json()).error || m; } catch (e) {} throw new Error(m); }
  if (data && data.error) throw new Error(data.error);
  return data;
}

function imprimir(r) {
  const cfg = TRAMITES[r.tipo]; if (!cfg) { toast("Este documento no tiene formato de acta."); return; }

}
