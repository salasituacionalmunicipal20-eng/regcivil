<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema · Registro Civil — Alcaldía de Cristóbal Rojas</title>
<style>
  :root{--navy:#0a2351;--navy2:#123571;--blue:#0a6cb0;--gold:#f4c20d;--red:#d21534;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#eef2f7;--surface:#fff;--ok:#16a34a;--r:12px;--sans:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  button{font:inherit;cursor:pointer;}
  input,select,textarea{font:inherit;width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc;color:var(--ink);outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);background:#fff;}
  textarea{min-height:64px;resize:vertical;}
  .hidden{display:none!important;}
  .tri{height:5px;display:flex}.tri i{flex:1}.tri i:nth-child(1){background:var(--gold)}.tri i:nth-child(2){background:var(--blue)}.tri i:nth-child(3){background:var(--red)}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:var(--navy2)}
  .btn.g{background:var(--ok)}.btn.g:hover{filter:brightness(1.06)}
  .btn.r{background:#fee2e2;color:#b91c1c}.btn.r:hover{background:#fecaca}
  .btn.o{background:#fff;color:var(--navy);border:1px solid #cbd5e1}.btn.o:hover{background:#f1f5f9}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#0a2351,#071a3d);}
  .card-login{background:#fff;border-radius:16px;box-shadow:0 30px 70px rgba(0,0,0,.4);width:100%;max-width:400px;overflow:hidden;}
  .card-login .hd{background:var(--navy);color:#fff;padding:26px 26px 22px;text-align:center;}
  .card-login .hd svg{margin:0 auto 8px}
  .card-login .hd b{display:block;font-size:16px;font-weight:850}
  .card-login .hd span{display:block;font-size:12px;color:#aebfdf;margin-top:2px}
  .card-login .bd{padding:24px}
  .card-login label{display:block;font-size:12.5px;font-weight:700;color:#334155;margin:12px 0 5px}
  .card-login .msg{font-size:13px;border-radius:8px;padding:9px 11px;margin-top:14px;display:none}
  .card-login .msg.err{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;display:block}
  .card-login .msg.ok{background:#f0fdf4;color:#15803d;border:1px solid #86efac;display:block}
  /* app shell */
  .top{background:var(--navy);color:#fff;display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;position:sticky;top:0;z-index:30}
  .top .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px}
  .top .brand span{font-size:11px;color:#aebfdf;font-weight:600}
  .top .sp{flex:1}
  .top .u{font-size:13px;color:#dbe4f5}.top .u b{color:#fff}
  .top .pill{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700}
  .menu-btn{display:none;background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;width:38px;height:38px;font-size:18px}
  .wrap{display:flex;min-height:calc(100vh - 61px)}
  .side{width:230px;background:#fff;border-right:1px solid var(--line);padding:14px 10px;flex:none}
  .side a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:650;color:#334155;margin-bottom:2px}
  .side a:hover{background:#f1f5f9}
  .side a.on{background:var(--navy);color:#fff}
  .side .grp{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;padding:12px 12px 5px}
  .main{flex:1;padding:22px;max-width:1100px;min-width:0}
  h1.t{font-size:22px;font-weight:850;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13.5px;margin-top:2px}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 1px 2px rgba(11,23,48,.05),0 8px 24px rgba(11,23,48,.05);padding:18px;margin-top:16px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .stat{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:14px}
  .stat b{display:block;font-size:26px;font-weight:850;color:var(--navy)}
  .stat span{font-size:12.5px;color:var(--muted);font-weight:600}
  .grid-tram{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
  .tram-b{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;text-align:left;transition:.14s;display:flex;gap:11px;align-items:center}
  .tram-b:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 10px 24px rgba(10,35,81,.1)}
  .tram-b .ic{width:38px;height:38px;border-radius:9px;background:#e6f0fb;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
  .tram-b b{font-size:13.5px;font-weight:750;display:block}.tram-b small{color:var(--muted);font-size:11px}
  table{width:100%;border-collapse:collapse}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid #eef2f7;font-size:13px;vertical-align:top}
  th{background:var(--navy);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
  tbody tr:hover{background:#f8fafc}
  .badge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .badge.leg{background:#fef9c3;color:#854d0e}.badge.mine{background:#e6f0fb;color:#0a6cb0}.badge.a{background:#dcfce7;color:#15803d}
  .filtros{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .filtros input,.filtros select{width:auto;min-width:150px}
  .form-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
  .fld{display:flex;flex-direction:column;gap:4px}
  .fld label{font-size:12px;font-weight:700;color:#475569}
  .sec-t{grid-column:1/-1;font-size:13px;font-weight:800;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:5px;margin-top:8px;text-transform:uppercase;letter-spacing:.03em}
  .w2{grid-column:span 2}.w3{grid-column:span 3}.w4{grid-column:span 4}.w5{grid-column:span 5}.w6{grid-column:span 6}.w8{grid-column:span 8}.w12{grid-column:span 12}
  @media(max-width:760px){.w2,.w3,.w4,.w5,.w6,.w8{grid-column:span 6}.side{position:fixed;left:0;top:56px;bottom:0;z-index:25;transform:translateX(-100%);transition:.2s;box-shadow:0 10px 40px rgba(0,0,0,.2)}.side.open{transform:none}.menu-btn{display:block}.main{padding:16px}}
  .modal-bg{position:fixed;inset:0;background:rgba(8,15,30,.55);display:none;align-items:flex-start;justify-content:center;padding:24px;z-index:50;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:820px;width:100%;padding:22px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.3);display:none}
  .fila{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
  .fila .k{font-weight:700;color:#475569;min-width:190px}
  .empty{text-align:center;color:var(--muted);padding:34px}
  .spin{width:30px;height:30px;border:3px solid #dbe4f5;border-top-color:var(--navy);border-radius:50%;animation:sp 1s linear infinite;margin:30px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="card-login">
    <div class="tri"><i></i><i></i><i></i></div>
    <div class="hd">
      <svg viewBox="0 0 48 56" width="40" height="46"><path d="M24 2 44 9v20c0 13-9 21-20 25C13 50 4 42 4 29V9z" fill="#123571" stroke="#f4c20d" stroke-width="2"/><path d="M24 12l2.6 5.6 6 .8-4.4 4.3 1.1 6L24 31.9 18.7 34.7l1.1-6-4.4-4.3 6-.8z" fill="#f4c20d"/></svg>
      <b>Registro Civil</b><span>Alcaldía del Municipio Cristóbal Rojas</span>
    </div>
    <div class="bd">
      <div id="loginView">
        <label>Usuario</label>
        <input id="lgUser" autocomplete="username" placeholder="ej: carolina.garcia" />
        <label>Contraseña</label>
        <input id="lgPass" type="password" autocomplete="current-password" placeholder="••••••" />
        <div class="msg" id="lgMsg"></div>
        <button class="btn" id="lgBtn" style="width:100%;justify-content:center;margin-top:16px">Ingresar</button>
      </div>
      <div id="changeView" class="hidden">
        <p style="font-size:13.5px;color:#475569;margin-bottom:6px">Por seguridad debes <b>cambiar tu contraseña</b> antes de continuar.</p>
        <label>Nueva contraseña</label>
        <input id="np1" type="password" placeholder="mínimo 6 caracteres" />
        <label>Repite la nueva contraseña</label>
        <input id="np2" type="password" />
        <div class="msg" id="cpMsg"></div>
        <button class="btn g" id="cpBtn" style="width:100%;justify-content:center;margin-top:16px">Guardar y entrar</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <div class="tri"><i></i><i></i><i></i></div>
  <style>.bcv-top{font-size:12px;color:#e5e7eb;background:rgba(255,255,255,.14);padding:5px 10px;border-radius:999px;white-space:nowrap;margin-right:8px}.bcv-top b{color:#fff}@media(max-width:720px){.bcv-top{display:none}}</style>
  <div class="top">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="brand"><svg viewBox="0 0 48 56" width="24" height="28"><path d="M24 2 44 9v20c0 13-9 21-20 25C13 50 4 42 4 29V9z" fill="#fff" stroke="#f4c20d" stroke-width="2"/><path d="M24 12l2.6 5.6 6 .8-4.4 4.3 1.1 6L24 31.9 18.7 34.7l1.1-6-4.4-4.3 6-.8z" fill="#f4c20d"/></svg><div>Registro Civil<span style="display:block">Cristóbal Rojas</span></div></div>
    <div class="sp"></div>
    <span class="bcv-top" id="bcvTop" title="Tasa oficial BCV · se actualiza cada 3 h">💵 <b id="bcvUsd">—</b> · 💶 <b id="bcvEur">—</b></span>
    <span class="u">Hola, <b id="uNom">—</b></span>
    <span class="pill" id="uRol">—</span>
    <button class="btn o sm" id="btnSalir">Salir</button>
  </div>
  <div class="wrap">
    <nav class="side" id="side"></nav>
    <main class="main" id="view"><div class="spin"></div></main>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

tivas a la vida familiar, y fijarán el domicilio conyugal.\nArt. 140A. El domicilio conyugal será el lugar donde el marido y la mujer tengan establecida de mútuo acuerdo, su residencia. En caso de que los cónyuges tuvieren residencias separadas, de hecho o en virtud de la autorización judicial prevista en el artículo 138, el domicilio conyugal será el lugar de la última residencia común. El Cambio de residencia sólo podrá hacerse si ambos cónyuges estan de acuerdo en ello."},{"t":"Capitulaciones","campos":[{"n":"capi_datos","l":"Datos del registro","t":"ta","w":6},{"n":"capi_numero","l":"N°","t":"t","w":3},{"n":"capi_fecha","l":"Fecha","t":"date","w":3}]},{"t":"Apoderado(a)","campos":[{"n":"apo_nombres","l":"Nombres","t":"t","w":6},{"n":"apo_cedula","l":"Documento de identidad","t":"ced","w":6},{"n":"apo_poder","l":"Datos del poder / notaría","t":"ta","w":6},{"n":"apo_numero","l":"N°","t":"t","w":3},{"n":"apo_fecha","l":"Fecha","t":"date","w":3}]},{"t":"Hijos a legitimar","rep":{"key":"hijos","singular":"hijo","plural":"hijos","campos":[{"n":"nombres","l":"Nombres y apellidos","t":"t","w":5},{"n":"documento","l":"Documento (cédula)","t":"ced","w":3},{"n":"edad","l":"Edad","t":"t","w":2},{"n":"acta","l":"Datos de acta","t":"t","w":2}]}},{"t":"Testigo 1","campos":[{"n":"t1_nombre","l":"Nombres","t":"t","w":6},{"n":"t1_cedula","l":"Cédula","t":"ced","w":6},{"n":"t1_fecha_nac","l":"Fecha de nacimiento","t":"date","w":4},{"n":"t1_profesion","l":"Profesión","t":"t","w":4},{"n":"t1_nacionalidad","l":"Nacionalidad","t":"t","w":4},{"n":"t1_direccion","l":"Dirección","t":"ta","w":12}]},{"t":"Testigo 2","campos":[{"n":"t2_nombre","l":"Nombres","t":"t","w":6},{"n":"t2_cedula","l":"Cédula","t":"ced","w":6},{"n":"t2_fecha_nac","l":"Fecha de nacimiento","t":"date","w":4},{"n":"t2_profesion","l":"Profesión","t":"t","w":4},{"n":"t2_nacionalidad","l":"Nacionalidad","t":"t","w":4},{"n":"t2_direccion","l":"Dirección","t":"ta","w":12}]},{"t":"Datos de inserción","campos":[{"n":"acta_ins /* ============ AUTH ============ */
async function cargarPerfil() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return null;
  USER = user;
  const { data } = await sb.from("rc_perfiles").select("*").eq("id", user.id).single();
  PERFIL = data; return data;
}
async function registrar(accion, tipo, tramite_id, resumen, detalle) {
  try { await sb.from("rc_bitacora").insert({ actor: USER.id, actor_usuario: PERFIL.usuario, accion, tipo: tipo || null, tramite_id: tramite_id || null, resumen, detalle: detalle || null }); } catch (e) {}
}
$("lgBtn").onclick = async () => {
  const u = ($("lgUser").value || "").trim().toLowerCase().replace(/@.*$/, "");
  const p = $("lgPass").value;

// Ticker BCV (dolar/euro oficial) — mismo formato que la landing, cache 3 h.
async function cargarBCV() {
  const U = document.getElementById("bcvUsd"), E = document.getElementById("bcvEur"); if (!U || !E) return;
  const fmt = (n) => "Bs " + Number(n).toLocaleString("es-VE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  try {
    const c = JSON.parse(localStorage.getItem("bcv_rc") || "null");
    if (c && Date.now() - c.t < 108e5) { U.textContent = fmt(c.usd); E.textContent = fmt(c.eur); return; }
    const [ru, re] = await Promise.all([
      fetch("https://ve.dolarapi.com/v1/dolares/oficial").then(r => r.json()),
      fetch("https://ve.dolarapi.com/v1/euros/oficial").then(r => r.json()),
    ]);
    const usd = ru.promedio || ru.venta, eur = re.promedio || re.venta;
    if (usd) U.textContent = fmt(usd); if (eur) E.textContent = fmt(eur);
    if (usd && eur) localStorage.setItem("bcv_rc", JSON.stringify({ usd, eur, t: Date.now() }));
  } catch (e) {}
}

const CNE_ENDPOINT = "https://tfbzghjjfcaqmkzsxrrs.supabase.co/functions/v1/consultar-cedula";
function cneCampo(base, cn, words) {
  for (const w of words) for (const cand of [cn.replace("cedula", w), cn.replace("_cedula", "_" + w), cn.replace("cedula_", w + "_")]) {
    if (cand !== cn) { const el = base.querySelector('[data-n="' + cand + '"]'); if (el) return el; }
  }
  return null;
}
// Nucleo CNE reutilizable: valida una cedula y autocompleta nombre/apellido/fecha del elemento dado (sirve para campos normales y para los de repetidores).
function cneAttach(cedNumEl, pfxEl, nomEl, apeEl, fechaEl) {
  const nota = document.createElement("div"); nota.style.cssText = "font-size:11px;margin-top:3px;min-height:12px;font-weight:600";
  (cedNumEl.closest(".fld") || cedNumEl.parentNode).appendChild(nota);
  cedNumEl.addEventListener("blur", async () => {
    const num = (cedNumEl.value || "").replace(/\D/g, ""); nota.textContent = ""; nota.style.color = "";
    if (num.length < 5 || num.length > 9) return;
    const nac = (pfxEl && pfxEl.value === "E") ? "E" : "V";
    const bg = cedNumEl.style.background; cedNumEl.style.background = "#fef9c3";
    try {
      const resp = await fetch(CNE_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ cedula: num, nacionalidad: nac }) });
      const j = await resp.json(); const d = j && j.data;
      if (resp.ok && d && j.error !== true && (d.primer_nombre || d.primer_apellido)) {
        if (nomEl && apeEl) {
          if (!nomEl.value.trim()) nomEl.value = [d.primer_nombre, d.segundo_nombre].filter(Boolean).join(" ");
          if (!apeEl.value.trim()) apeEl.value = [d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
        } else if (nomEl && !nomEl.value.trim()) {
          nomEl.value = [d.primer_nombre, d.segundo_nombre, d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
        }
        if (nomEl) nomEl.dispatchEvent(new Event("input", { bubbles: true }));
        if (fechaEl && !fechaEl.value && /^\d{4}-\d{2}-\d{2}$/.test(d.fecha_nac || "") && d.fecha_nac !== "0000-00-00") fechaEl.value = d.fecha_nac;
        cedNumEl.style.background = "#dcfce7"; setTimeout(() => { cedNumEl.style.background = bg; }, 1400);
        nota.style.color = "#15803d"; nota.textContent = "✓ CNE: " + [d.primer_nombre, d.segundo_nombre, d.primer_apellido, d.segundo_apellido].filter(Boolean).join(" ");
      } else {
        cedNumEl.style.background = bg; nota.style.color = "#b45309"; nota.textContent = "Cédula no registrada en CNE";
      }
    } catch (e) { cedNumEl.style.background = bg; }
  });
}

async function vForm(tipo, registro) {
  const cfg = TRAMITES[tipo]; if (!cfg) { go("nuevo"); return; }
  const datos = (registro && registro.datos) || {};
  EDIT_ID = registro ? registro.id : null;
  let campos = "";
  cfg.secciones.forEach(sec => {
    if (sec.texto) { campos += `<div class="sec-t">${esc(sec.t)}</div><div class="w12" style="grid-column:1/-1;font-size:12px;line-height:1.5;color:#475569;white-space:pre-line;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px">${esc(sec.texto)}</div>`; return; }
    if (sec.rep) { campos += `<div class="sec-t">${esc(sec.t)}</div><div class="fld w4"><label>¿Tiene ${esc(sec.rep.plural)}?</label><select data-reptoggle="${sec.rep.key}"><option value="">Seleccione</option><option value="si">Sí</option><option value="no">No</option></select></div><div class="w12" data-rep="${sec.rep.key}" style="display:none;grid-column:1/-1"></div>`; return; }
    campos += `<div class="sec-t">${esc(sec.t)}</div>`;
    sec.campos.forEach(c => {
      const val = datos[c.n] != null ? datos[c.n] : "";
      let input;
      if (c.t === "ta") input = `<textarea data-n="${c.n}">${esc(val)}</textarea>`;
      else if (c.t === "sel") input = `<select data-n="${c.n}"><option value="">—</option>${c.o.map(o => `<option ${val === o ? "selected" : ""}>${esc(o)}</option>`).join("")}</select>`;
      else if (c.t === "date") input = `<input type="date" data-n="${c.n}" value="${esc(val)}">`;
      else if (c.t === "num") input = `<input type="number" data-n="${c.n}" value="${esc(val)}">`;
      else if (c.t === "ced") {
        const mm = String(val).match(/^\s*([VE])?\s*-?\s*(.*)$/i);
        const pfx = (mm && mm[1] ? mm[1] : "V").toUpperCase(), num = (mm ? mm[2] : "").replace(/[^0-9]/g, "");
        input = `<div style="display:flex;gap:6px"><select data-cedpfx="${c.n}" style="width:62px;flex:none">${["V", "E"].map(o => `<option ${pfx === o ? "selected" : ""}>${o}</option>`).join("")}</select><input type="text" inputmode="numeric" data-cednum="${c.n}" value="${esc(num)}" placeholder="12345678" style="flex:1"></div>`;
      }
      else if (/(^|_)hora($|_)/.test(c.n)) {
        const mm = String(val).match(/^\s*([0-9: ]*?)\s*(a\.?\s?m\.?|p\.?\s?m\.?|am|pm)?\s*$/i);
        const hhmm = (mm ? mm[1] : "").trim(), ap = mm && mm[2] ? (/p/i.test(mm[2]) ? "PM" : "AM") : "";
        input = `<div style="display:flex;gap:6px"><input type="text" data-hora="${c.n}" value="${esc(hhmm)}" placeholder="HH:MM" style="flex:1"><select data-horaap="${c.n}" style="width:76px;flex:none"><option value=""></option><option ${ap === "AM" ? "selected" : ""}>AM</option><option ${ap === "PM" ? "selected" : ""}>PM</option></select></div>`;
      }
      else input = `<input type="text" data-n="${c.n}" value="${esc(val)}">`;
      campos += `<div class="fld w${c.w}"><label>${esc(c.l)}</label>${input}</div>`;
    });
  });
  const hoy = new Date().toISOString().slice(0, 10);
  const numHtml = cfg.num ? `<div class="fld w4"><label>N° de acta</label><input type="text" id="fNum" value="${esc(registro ? registro.numero_acta || "" : "")}"></div><div class="fld w4"><label>Año</label><input type="number" id="fAno" value="${registro ? registro.ano || new Date().getFullYear() : new Date().getFullYear()}"></div>` : "";
  $("view").innerHTML = `<h1 class="t">${EDIT_ID ? "Editar" : "Nuevo"}: ${esc(cfg.label)}</h1><div class="sub">${esAdmin() ? "" : "Este registro quedará asociado a tu usuario."}</div>
    <div class="card"><div class="form-grid">
      ${cfg.num ? `<div class="sec-t">Numeración</div>${numHtml}<div class="fld w4"><label>Fecha</label><input type="date" id="fFecha" value="${esc(registro ? registro.fecha || hoy : hoy)}"></div>` : `<div class="fld w4" style="display:none"><input type="date" id="fFecha" value="${hoy}"></div>`}
      ${campos}
    </div>
    <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap">
      <button class="btn g" id="fSave">${EDIT_ID ? "💾 Guardar cambios" : "💾 Registrar"}</button>
      <button class="btn o" id="fCancel">Cancelar</button>
    </div></div>`;
  if (cfg.num && !EDIT_ID) sugerirNumero(tipo);
  $("fCancel").onclick = () => go(EDIT_ID ? "ver/" + EDIT_ID : "registros");
  $("fSave").onclick = () => guardar(tipo);
  engancharCNE($("view"));
  wireRepeaters(tipo, datos);
}
async function sugerirNumero(tipo) {
  const ano = $("fAno") ? Number($("fAno").value) : new Date().getFullYear();
  const { data } = await sb.from("rc_tramites").select("numero_acta").eq("tipo", tipo).eq("ano", ano);
  let max = 0; (data || []).forEach(r => { const n = parseInt(r.numero_acta, 10); if (!isNaN(n) && n > max) max = n; });
  if ($("fNum") && !$("fNum").value) $("fNum").value = max + 1;
}
async function guardar(tipo) {
  const cfg = TRAMITES[tipo];
  const datos = {};
  $("view").querySelectorAll("[data-n]").forEach(el => { const v = (el.value || "").trim(); if (v) datos[el.dataset.n] = v; });
  $("view").querySelectorAll("[data-cednum]").forEach(el => { const n = el.dataset.cednum, num = (el.value || "").replace(/[^0-9]/g, ""); if (num) { const p = $("view").querySelector('[data-cedpfx="' + n + '"]'); datos[n] = ((p && p.value) || "V") + "-" + num; } });
  $("view").querySelectorAll("[data-hora]").forEach(el => { const n = el.dataset.hora, hh = (el.value || "").trim(); if (hh) { const a = $("view").querySelector('[data-horaap="' + n + '"]'); datos[n] = hh + (a && a.value ? " " + a.value.toLowerCase() : ""); } });
  $("view").querySelectorAll("[data-rep]").forEach(cont => { const key = cont.dataset.rep, arr = []; cont.querySelectorAll(".rep-item").forEach(it => { const o = {}; it.querySelectorAll("[data-repfield]").forEach(el => { let v = (el.value || "").trim(); if (el.classList.contains("repced")) { const num = v.replace(/[^0-9]/g, ""); if (!num) return; const p = el.parentNode.querySelector(".repcedpfx"); v = ((p && p.value) || "V") + "-" + num; } if (v) o[el.dataset.repfield] = v; }); if (Object.keys(o).length) arr.push(o); }); if (arr.length) datos[key] = arr; });
  const titular = cfg.titular.map(k => datos[k]).filter(Boolean).join(" ").trim() || "(sin nombre)";
  const cedula = datos[cfg.ced] || null;
  const row = {
    tipo, titular, cedula_titular: cedula,
    numero_acta: $("fNum") ? ($("fNum").value || null) : null,
    ano: $("fAno") ? Number($("fAno").value) || null : null,
    fecha: $("fFecha") ? ($("fFecha").value || null) : null,
    datos, owner: USER.id, owner_usuario: PERFIL.usuario,
  };
  $("fSave").disabled = true; $("fSave").textContent = "Guardando…";
  let res, id;
  if (EDIT_ID) { res = await sb.from("rc_tramites").update(row).eq("id", EDIT_ID); id = EDIT_ID; }
  else { const r = await sb.from("rc_tramites").insert(row).select("id").single(); res = r; id = r.data && r.data.id; }
  $("fSave").disabled = false;
  if (res.error) { toast("Error: " + res.error.message); $("fSave").textContent = "💾 Registrar"; return; }
  await registrar(EDIT_ID ? "editar" : "crear", tipo, id, `${EDIT_ID ? "Editó" : "Registró"} ${cfg.label}: ${titular}`, { numero_acta: row.numero_acta });
  toast(EDIT_ID ? "Cambios guardados ✓" : "Trámite registrado ✓");
  go("ver/" + id);
}

async function vVer(id) {

  if (!r) { $("view").innerHTML = `<div class="empty">Registro no encontrado o sin acceso.</div>`; return; }
  const cfg = TRAMITES[r.tipo];
  const puedeEditar = (r.owner === USER.id || esAdmin()) && r.tipo !== "acta_legacy";
  let cuerpo = "";
  if (cfg) { cfg.secciones.forEach(sec => {
    if (sec.texto) { cuerpo += `<div class="sec-t" style="border:none;color:#0a2351">${esc(sec.t)}</div><div class="fila"><span style="font-size:12px;line-height:1.5;color:#475569;white-space:pre-line">${esc(sec.texto)}</span></div>`; return; }

    const filas = sec.campos.map(c => { const v = (r.datos || {})[c.n]; return v ? `<div class="fila"><span class="k">${esc(c.l)}</span><span>${esc(v)}</span></div>` : ""; }).join(""); if (filas) cuerpo += `<div class="sec-t" style="border:none;color:#0a2351">${esc(sec.t)}</div>${filas}`;
  }); }
  else { cuerpo = Object.entries(r.datos || {}).map(([k, v]) => `<div class="fila"><span class="k">${esc(k)}</span><span>${esc(v)}</span></div>`).join(""); }
  $("view").innerHTML = `<h1 class="t">${esc(tipoLabel(r.tipo))} ${r.legacy ? '<span class="badge leg">Archivo</span>' : ''}</h1>

    <div class="card">${cuerpo || '<div class="empty">Sin datos.</div>'}
    <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap">
      ${r.pdf_path
        ? `<button class="btn" id="descargarOrig">📄 Descargar PDF</button><button class="btn o" id="verPdf">👁️ Ver PDF</button>`
        : (cfg ? `<button class="btn" id="imprimir">📄 Descargar acta (PDF)</button><button class="btn o" id="imprimirBtn">🖨️ Imprimir</button>` : "")}
      ${puedeEditar ? `<button class="btn o" id="editar">✏️ Editar</button><button class="btn r" id="eliminar">🗑️ Eliminar</button>` : ""}
      <button class="btn o" id="volver">← Volver</button>
    </div></div>`;
  $("volver").onclick = () => go("registros");
  if ($("editar")) $("editar").onclick = () => vForm(r.tipo, r);
  if ($("eliminar")) $("eliminar").onclick = () => eliminar(r);
  if ($("imprimir")) $("imprimir").onclick = () => imprimir(r);
  if ($("imprimirBtn")) $("imprimirBtn").onclick = () => imprimirPDF(r);
  if ($("verPdf")) $("verPdf").onclick = () => abrirPdfOriginal(r.pdf_path, false);
  if ($("descargarOrig")) $("descargarOrig").onclick = () => abrirPdfOriginal(r.pdf_path, r.titular || "acta");
}
// Actas del archivo: entregar el PDF ORIGINAL tal cual (sin regenerar). descargarComo=false -> ver en el navegador.
async function abrirPdfOriginal(pdfPath, descargarComo) {
  const opts = descargarComo ? { download: (String(descargarComo).replace(/[^\w .-]/g, "_").slice(0, 60) || "acta") + ".pdf" } : {};
  const { data, error } = await sb.storage.from("actas").createSignedUrl(pdfPath, 3600, opts);
  if (error || !data) { toast("No se pudo abrir el PDF"); return; }
  if (descargarComo) { const a = document.createElement("a"); a.href = data.signedUrl; a.download = ""; document.body.appendChild(a); a.click(); a.remove(); }
  else window.open(data.signedUrl, "_blank");
}
async function eliminar(r) {
  if (!confirm(`¿Eliminar este trámite (${tipoLabel(r.tipo)} — ${r.titular})? No se puede deshacer.`)) return;
  const { error } = await sb.from("rc_tramites").delete().eq("id", r.id);
  if (error) { toast("Error: " + error.message); return; }
  await registrar("eliminar", r.tipo, null, `Eliminó ${tipoLabel(r.tipo)}: ${r.titular}`);
  toast("Trámite eliminado"); go("registros");
}

/* ---- Administración de usuarios ---- */
async function invocarAdmin(body) {
  const { data, error } = await sb.functions.invoke("admin-usuarios", { body });
  if (error) { let m = error.message; try { m = (await error.context.json()).error || m; } catch (e) {} throw new Error(m); }
  if (data && data.error) throw new Error(data.error);
  return data;
}

      <td><b>${esc(u.usuario)}</b></td><td>${esc(u.nombre || "—")}</td>
      <td><span class="badge ${u.rol === "admin" ? "leg" : "mine"}">${u.rol === "admin" ? "Administrador" : "Funcionario"}</span></td>
      <td>${u.must_change_password ? '<span class="badge" style="background:#fef3c7;color:#92400e">debe cambiar clave</span>' : '<span class="badge a">activo</span>'}</td>
      <td style="white-space:nowrap">
        <button class="btn o sm" data-edit="${u.id}">Editar</button>
        <button class="btn o sm" data-reset="${u.id}" data-u="${esc(u.usuario)}">Reset 123456</button>
        ${u.id === USER.id ? "" : `<button class="btn r sm" data-del="${u.id}" data-u="${esc(u.usuario)}">Eliminar</button>`}
      </td></tr>`).join("")}</tbody></table></div>`;
    const map = {}; (usuarios || []).forEach(u => map[u.id] = u);
    $("uTabla").querySelectorAll("[data-edit]").forEach(b => b.onclick = () => modalUsuario(map[b.dataset.edit]));
    $("uTabla").querySelectorAll("[data-reset]").forEach(b => b.onclick = async () => {
      if (!confirm(`¿Resetear la contraseña de ${b.dataset.u} a 123456? Se le pedirá cambiarla al entrar.`)) return;
      try { await invocarAdmin({ accion: "reset", id: b.dataset.reset, usuario: b.dataset.u }); toast("Contraseña reseteada a 123456"); } catch (e) { toast("Error: " + e.message); }
    });
    $("uTabla").querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
      if (!confirm(`¿Eliminar al usuario ${b.dataset.u}? Esta acción no se puede deshacer.`)) return;
      try { await invocarAdmin({ accion: "eliminar", id: b.dataset.del, usuario: b.dataset.u }); toast("Usuario eliminado"); vUsuarios(); } catch (e) { toast("Error: " + e.message); }
    });
  } catch (e) { $("uTabla").innerHTML = `<div class="empty">No se pudo cargar: ${esc(e.message)}</div>`; }
}
function modalUsuario(u) {
  const ed = !!u;
  $("modal").innerHTML = `<h3 style="font-size:18px;font-weight:850;margin-bottom:4px">${ed ? "Editar usuario" : "Nuevo usuario"}</h3>
    <div class="form-grid" style="margin-top:10px">
      <div class="fld w6"><label>Usuario</label><input id="muUser" value="${ed ? esc(u.usuario) : ""}" ${ed ? "disabled" : ""} placeholder="ej: maria.perez"></div>
      <div class="fld w6"><label>Nombre completo</label><input id="muNom" value="${ed ? esc(u.nombre || "") : ""}"></div>
      <div class="fld w6"><label>Cargo</label><input id="muCargo" value="${ed ? esc(u.cargo || "") : ""}"></div>
      <div class="fld w3"><label>Cédula</label><input id="muCed" value="${ed ? esc(u.cedula || "") : ""}"></div>
      <div class="fld w3"><label>Rol</label><select id="muRol"><option value="funcionario" ${ed && u.rol !== "admin" ? "selected" : ""}>Funcionario</option><option value="admin" ${ed && u.rol === "admin" ? "selected" : ""}>Administrador</option></select></div>
      ${ed ? "" : `<div class="fld w6"><label>Contraseña inicial</label><input id="muPass" value="123456"><small style="color:#64748b;font-size:11px">Se le pedirá cambiarla al ingresar.</small></div>`}
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn o" id="muCancel">Cancelar</button><button class="btn g" id="muSave">${ed ? "Guardar" : "Crear usuario"}</button>
    </div>`;
  $("modalBg").classList.add("show");
  $("muCancel").onclick = () => $("modalBg").classList.remove("show");
  $("muSave").onclick = async () => {
    $("muSave").disabled = true;
    try {
      if (ed) await invocarAdmin({ accion: "actualizar", id: u.id, usuario: u.usuario, nombre: $("muNom").value, cargo: $("muCargo").value, cedula: $("muCed").value, rol: $("muRol").value });
      else await invocarAdmin({ accion: "crear", usuario: $("muUser").value, nombre: $("muNom").value, cargo: $("muCargo").value, cedula: $("muCed").value, rol: $("muRol").value, password: $("muPass").value });
      $("modalBg").classList.remove("show"); toast(ed ? "Usuario actualizado" : "Usuario creado"); vUsuarios();
    } catch (e) { $("muSave").disabled = false; toast("Error: " + e.message); }
  };
}
$("modalBg").addEventListener("click", e => { if (e.target === $("modalBg")) $("modalBg").classList.remove("show"); });

    }
    y += 2.5;
  });
  bloqueFirmas(doc, y);
  return doc;
}
function narrativa(r) {
  const d = r.datos || {};
  const nom = (r.titular || d.nombres || "").trim();
  const ced = d.cedula || r.cedula_titular || "";
  let b = `Quien suscribe, ${FIRMA.nombre}, Registradora Civil del Municipio Cristóbal Rojas del Estado Bolivariano de Miranda, según Resolución N° ${FIRMA.resolucion}, por medio de la presente hace constar que el(la) ciudadano(a) ${nom}, titular de la cédula de identidad N° ${ced}`;
  if (d.fecha_nac) b += `, nacido(a) el ${fechaLarga(d.fecha_nac)}`;
  if (d.nacionalidad) b += `, de nacionalidad ${d.nacionalidad}`;
  if (d.estado_civil) b += `, de estado civil ${d.estado_civil}`;
  if (d.profesion) b += `, de profesión ${d.profesion}`;
  const c = {
    fe_vida: `, se encuentra VIVO(A) y domiciliado(a) en ${d.direccion || "esta jurisdicción"}. La presente Fe de Vida tiene validez por un (1) año.`,
    residencia: `, reside de forma permanente en ${d.direccion || "—"}, con un tiempo de ${d.tiempo || ""} ${d.indicador || ""}, según aval de ${d.organo || "la comunidad organizada"}.`,
    solteria: `, es de estado civil SOLTERO(A) y domiciliado(a) en ${d.direccion || "—"}.`,
    buena_conducta: `, observa BUENA CONDUCTA, según aval de ${d.organo || "la comunidad organizada"}, y está domiciliado(a) en ${d.direccion || "—"}.`,
    perdida: `, declara BAJO FE DE JURAMENTO haber extraviado el (los) siguiente(s) documento(s): ${d.documentos || "—"}.`,
    manutencion: `, a los fines de la presente Constancia de Manutención${d.nombres_t ? ", siendo su representante/tutor(a) " + d.nombres_t : ""}.`,
    expensa: `, a los fines de la presente Constancia de Expensa${d.nombres_t ? ", ante " + d.nombres_t : ""}.`,
    viudez: `, es de estado civil VIUDO(A)${d.viudo_desde ? " desde " + d.viudo_desde : ""}${d.nombres2 ? " del (la) ciudadano(a) " + d.nombres2 : ""}${d.direccion ? ", domiciliado(a) en " + d.direccion : ""}.`,
  }[r.tipo] || `, a los fines legales consiguientes.`;
  return b + c;
}
function generarConstanciaPDF(r) {
  const cfg = TRAMITES[r.tipo], doc = nuevoDoc();
  const W = doc.internal.pageSize.getWidth(), MX = 24, RX = W - 24;
  tricolor(doc);
  let y = 22;
  doc.setFont("times", "bold"); doc.setFontSize(11); doc.setTextColor(0, 0, 0);
  ["REPÚBLICA BOLIVARIANA DE VENEZUELA", "ESTADO BOLIVARIANO DE MIRANDA", "MUNICIPIO CRISTÓBAL ROJAS", "OFICINA DE REGISTRO CIVIL"].forEach((t, i) => doc.text(t, W / 2, y + i * 5, { align: "center" }));
  y += 28;
  doc.setFontSize(16); doc.setTextColor(10, 35, 81); doc.text(cfg.label.toUpperCase(), W / 2, y, { align: "center" });
  y += 14; doc.setTextColor(0, 0, 0); doc.setFont("times", "normal"); doc.setFontSize(11.5);
  const lines = doc.splitTextToSize(narrativa(r), RX - MX);
  doc.text(lines, MX, y); y += lines.length * 6.4 + 12;
  doc.text(doc.splitTextToSize("Se expide la presente constancia a petición de la parte interesada, en Charallave, a los " + fechaLarga(new Date()) + ".", RX - MX), MX, y);
  y += 16;
  firma(doc, y);
  return doc;
}
function imprimir(r) {
  const cfg = TRAMITES[r.tipo]; if (!cfg) { toast("Este documento no tiene formato de acta."); return; }
  let doc;
  try { doc = cfg.num ? generarActaPDF(r) : generarConstanciaPDF(r); }
  catch (e) { toast("No se pudo generar el PDF: " + (e.message || e)); return; }
  const base = (cfg.label + " " + (r.numero_acta ? "N " + r.numero_acta : (r.titular || ""))).normalize("NFD").replace(/[^\w\- ]/g, "").trim().replace(/\s+/g, "_");
  doc.save((base || "acta") + ".pdf");
  registrar("imprimir", r.tipo, r.id, `Generó el PDF de ${cfg.label}: ${r.titular}`);
}
function imprimirPDF(r) {
  const cfg = TRAMITES[r.tipo]; if (!cfg) { toast("Este documento no tiene formato de acta."); return; }
  let doc;
  try { doc = cfg.num ? generarActaPDF(r) : generarConstanciaPDF(r); }
  catch (e) { toast("No se pudo generar el PDF: " + (e.message || e)); return; }
  try { if (doc.autoPrint) doc.autoPrint(); const w = window.open(doc.output("bloburl"), "_blank"); if (!w) { toast("Permite ventanas emergentes para imprimir"); return; } }
  catch (e) { toast("No se pudo abrir para imprimir"); return; }
  registrar("imprimir", r.tipo, r.id, `Imprimió ${cfg.label}: ${r.titular}`);
}
